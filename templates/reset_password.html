<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Northstar Bank</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon-16.svg') }}" sizes="16x16">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("vb-theme") || "light");</script>
</head>
<body class="auth-page">
    <a href="#resetForm" class="skip-link">Skip to reset form</a>

    <!-- Brand Panel -->
    <div class="auth-brand">
        <div class="auth-brand-content">
            <div class="brand-logo">
                <div class="brand-logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                </div>
                <span class="brand-logo-text">Northstar Bank</span>
            </div>
            <h2>Set a new password</h2>
            <p>Enter your reset PIN and a new password to regain access to your account.</p>
        </div>
    </div>

    <!-- Form Panel -->
    <div class="auth-form-panel">
        <div class="auth-form-container">
            <h1>New password</h1>
            <p class="auth-subtitle">Enter the reset PIN you received and your new password.</p>

            <div id="message"></div>

            <form id="resetForm">
                <div class="auth-input-group">
                    <input type="text" name="username" id="username" placeholder="Username" required aria-label="Username">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
                <div class="auth-input-group">
                    <input type="text" name="reset_pin" id="reset_pin" placeholder="4-Digit Reset PIN" required pattern="[0-9]{4}" aria-label="Reset PIN">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </div>
                <div class="auth-input-group">
                    <input type="password" name="new_password" id="new_password" placeholder="New password" required aria-label="New password">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                </div>
                <button type="submit">Reset Password</button>
            </form>

            <div class="auth-links">
                <a href="{{ url_for('login') }}">Back to sign in</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('resetForm').addEventListener('submit', async (event) => {
                event.preventDefault();
                const formData = new FormData(event.target);
                const jsonData = {};
                formData.forEach((value, key) => jsonData[key] = value);

                try {
                    const response = await fetch('/api/v3/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(jsonData)
                    });
                    const data = await response.json();
                    document.getElementById('message').innerHTML = data.status === 'success' ? 'Password reset successful!' : data.message;
                    document.getElementById('message').className = data.status === 'success' ? 'success' : 'error';
                    if (data.status === 'success') {
                        setTimeout(() => { window.location.href = '/login'; }, 2000);
                    }
                } catch (error) {
                    document.getElementById('message').innerHTML = 'Reset failed. Please try again.';
                    document.getElementById('message').className = 'error';
                }
            });
        });
    </script>
</body>
</html>
